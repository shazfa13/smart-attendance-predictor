{% extends 'base.html' %}
{% block title %}Login | Smart Attendance Risk Predictor{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-bg"></div>
  <div class="container position-relative">
    <div class="row justify-content-center align-items-center min-vh-100 py-5">
      <div class="col-md-7 col-lg-5">
        <div class="auth-card">
          <div class="text-center mb-4">
            <div class="brand-mark mx-auto mb-3">SAP</div>
            <h1 class="h3 fw-bold mb-2">Welcome back</h1>
            <p class="text-muted mb-0">Sign in to access the dashboard and analytics.</p>
          </div>
          <form method="post" class="needs-validation" novalidate>
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" class="form-control form-control-lg" name="username" placeholder="admin" required />
            </div>
            <div class="mb-3 position-relative">
              <label class="form-label">Password</label>
              <input type="password" class="form-control form-control-lg pe-5" name="password" id="passwordField" placeholder="admin123" required />
              <button type="button" class="toggle-password" data-target="passwordField">Show</button>
            </div>
            <div class="alert alert-primary small mb-4">
              Demo credentials: admin / admin123
            </div>
            <button type="submit" class="btn btn-accent w-100 btn-lg">Login</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
